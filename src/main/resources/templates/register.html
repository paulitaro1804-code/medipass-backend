<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head th:replace="~{fragments/head :: head('Registro de Paciente')}"></head>

<body class="font-sans bg-background text-foreground antialiased">

<div class="min-h-screen animated-gradient flex items-center justify-center p-4 relative overflow-hidden">

  <div class="absolute top-1/4 left-0 w-96 h-96 bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-0 w-80 h-80 bg-accent/10 rounded-full blur-[100px] pointer-events-none"></div>

  <div class="relative w-full max-w-md">

    <a th:href="@{/}" class="inline-flex items-center gap-2 text-muted-foreground hover:text-foreground transition-colors mb-8">
      <i data-lucide="arrow-left" class="w-4 h-4"></i>
      Volver al inicio
    </a>

    <div class="bg-card/80 backdrop-blur-xl border border-border/50 rounded-2xl overflow-hidden shadow-2xl">

      <div class="p-6 pb-0 text-center">
        <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-primary to-primary/60 flex items-center justify-center mx-auto mb-4">
          <span class="text-primary-foreground font-bold text-xl">M</span>
        </div>
        <h1 class="text-2xl font-bold text-foreground">Registro de Paciente</h1>
        <p class="text-muted-foreground mt-1">Crea tu cuenta con tu numero de poliza</p>
      </div>

      <div class="p-6">

        <div th:if="${success}" class="text-center py-6 space-y-4">
          <div class="w-16 h-16 rounded-full bg-success/20 flex items-center justify-center mx-auto">
            <i data-lucide="check" class="w-8 h-8 text-success"></i>
          </div>
          <h3 class="text-lg font-semibold text-foreground">Solicitud enviada!</h3>
          <p class="text-sm text-muted-foreground">
            Tu solicitud ha sido enviada. Un validador revisara tu poliza y recibiras un correo cuando tu cuenta sea aprobada.
          </p>
          <a th:href="@{/login}" class="inline-block text-primary hover:underline text-sm">Ir al inicio de sesion</a>
        </div>

        <div th:unless="${success}">

          <div th:if="${error}"
               class="mb-4 text-sm text-destructive bg-destructive/10 border border-destructive/30 rounded-lg px-4 py-3"
               th:text="${error}">Error al registrar.</div>

          <form th:action="@{/register}" method="post" data-loading="true" class="space-y-4">

            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-2">
                <label for="firstName" class="block text-sm font-medium text-foreground">Nombres</label>
                <div class="relative">
                  <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none"></i>
                  <input id="firstName" name="firstName" type="text" placeholder="Juan" required autocomplete="given-name"
                         class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
                </div>
              </div>
              <div class="space-y-2">
                <label for="lastName" class="block text-sm font-medium text-foreground">Apellidos</label>
                <input id="lastName" name="lastName" type="text" placeholder="Perez" required autocomplete="family-name"
                       class="w-full px-4 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
              </div>
            </div>

            <div class="space-y-2">
              <label for="document" class="block text-sm font-medium text-foreground">Documento de identidad</label>
              <div class="relative">
                <i data-lucide="file-text" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none"></i>
                <input id="document" name="document" type="text" placeholder="1234567890" required inputmode="numeric"
                       class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
              </div>
            </div>

            <div class="space-y-2">
              <label for="policyNumber" class="block text-sm font-medium text-foreground">Numero de poliza</label>
              <div class="relative">
                <i data-lucide="shield" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none"></i>
                <input id="policyNumber" name="policyNumber" type="text" placeholder="POL-2026-XXXXXX" required
                       class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
              </div>
            </div>

            <div class="space-y-2">
              <label for="email" class="block text-sm font-medium text-foreground">Correo electronico</label>
              <div class="relative">
                <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none"></i>
                <input id="email" name="email" type="email" placeholder="correo@ejemplo.com" required autocomplete="email"
                       class="w-full pl-10 pr-4 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
              </div>
            </div>

            <div class="space-y-2">
              <label for="password" class="block text-sm font-medium text-foreground">Contrasena</label>
              <div class="relative">
                <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground pointer-events-none"></i>
                <input id="password" name="password" type="password" placeholder="Minimo 8 caracteres" required minlength="8" autocomplete="new-password"
                       class="w-full pl-10 pr-10 py-2.5 rounded-lg bg-secondary/50 border border-border/50 text-foreground placeholder:text-muted-foreground text-sm focus:outline-none focus:ring-2 focus:ring-ring/50 focus:border-primary/50 transition-colors" />
                <button type="button" class="password-toggle" data-target="password" title="Mostrar/ocultar contrasena">
                  <i data-lucide="eye" class="w-4 h-4"></i>
                </button>
              </div>
            </div>

            <button type="submit" data-loading-text="Registrando..."
                    class="w-full py-2.5 px-4 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 font-medium text-sm transition-colors focus:outline-none focus:ring-2 focus:ring-ring/50 disabled:opacity-60">
              Registrar
            </button>

          </form>

        </div>

        <div class="mt-6 text-center text-sm text-muted-foreground">
          Ya tienes cuenta?
          <a th:href="@{/login}" class="text-primary hover:underline">Inicia sesion aqui</a>
        </div>

      </div>
    </div>
  </div>
</div>

<script th:src="@{/js/medipass.js}"></script>

</body>
</html>
