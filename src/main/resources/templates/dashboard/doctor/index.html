<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Dashboard Medico')}"></head>
<body class="font-sans bg-background text-foreground antialiased">
<div id="sidebar-overlay"></div>
<div class="min-h-screen bg-background">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="lg:ml-64">
    <div th:replace="~{fragments/dashboard-header :: dashboardHeader}"></div>
    <div class="p-4 md:p-6 space-y-6">

      <!-- Stats Grid -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        <div class="stat-card bg-card rounded-xl border border-border/50 p-6">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-sm text-muted-foreground mb-1">Pacientes Hoy</p>
              <p class="text-3xl font-bold text-foreground" th:text="${stats?.patientsToday ?: 0}">0</p>
              <p class="text-sm text-muted-foreground mt-1" th:if="${stats != null}" th:text="${stats.patientsAttended + ' atendidos'}"></p>
            </div>
            <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary">
              <i data-lucide="users" class="w-6 h-6"></i>
            </div>
          </div>
        </div>
        <div class="stat-card bg-card rounded-xl border border-border/50 p-6">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-sm text-muted-foreground mb-1">En Espera</p>
              <p class="text-3xl font-bold text-foreground" th:text="${stats?.waitingPatients ?: 0}">0</p>
            </div>
            <div class="w-12 h-12 rounded-lg bg-warning/10 flex items-center justify-center text-warning">
              <i data-lucide="clock" class="w-6 h-6"></i>
            </div>
          </div>
        </div>
        <div class="stat-card bg-card rounded-xl border border-border/50 p-6">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-sm text-muted-foreground mb-1">Historias Hoy</p>
              <p class="text-3xl font-bold text-foreground" th:text="${stats?.recordsToday ?: 0}">0</p>
            </div>
            <div class="w-12 h-12 rounded-lg bg-info/10 flex items-center justify-center text-info">
              <i data-lucide="file-text" class="w-6 h-6"></i>
            </div>
          </div>
        </div>
        <div class="stat-card bg-card rounded-xl border border-border/50 p-6">
          <div class="flex items-start justify-between">
            <div>
              <p class="text-sm text-muted-foreground mb-1">Labs Pendientes</p>
              <p class="text-3xl font-bold text-foreground" th:text="${stats?.pendingLabResults ?: 0}">0</p>
            </div>
            <div class="w-12 h-12 rounded-lg bg-accent/10 flex items-center justify-center text-accent">
              <i data-lucide="flask-conical" class="w-6 h-6"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Agenda del Dia -->
      <div class="bg-card border border-border/50 rounded-xl overflow-hidden">
        <div class="p-6 pb-4">
          <h3 class="text-foreground font-semibold flex items-center gap-2">
            <i data-lucide="calendar" class="w-5 h-5 text-primary"></i> Agenda del Dia
          </h3>
        </div>
        <div class="px-6 pb-6 space-y-3">
          <div th:each="patient : ${todayPatients}"
               th:classappend="${patient.status == 'in-progress'} ? 'bg-primary/10 border border-primary/30' : (${patient.status == 'waiting'} ? 'bg-warning/10 border border-warning/30' : 'bg-secondary/30')"
               class="flex items-center justify-between p-4 rounded-lg gap-4">
            <div class="flex items-center gap-4 min-w-0">
              <div class="w-14 text-sm font-medium text-foreground flex-shrink-0" th:text="${patient.time}">09:00</div>
              <div class="min-w-0">
                <p class="font-medium text-foreground" th:text="${patient.name}">Nombre Paciente</p>
                <p class="text-sm text-muted-foreground" th:text="${patient.reason + ' - ' + patient.age + ' años'}">Motivo</p>
              </div>
            </div>
            <div class="flex-shrink-0">
              <span th:if="${patient.status == 'in-progress'}" class="px-2 py-0.5 rounded-full bg-primary/20 text-primary text-xs font-medium">En consulta</span>
              <span th:if="${patient.status == 'waiting'}" class="px-2 py-0.5 rounded-full bg-warning/20 text-warning text-xs font-medium">En espera</span>
              <span th:if="${patient.status == 'scheduled'}" class="px-2 py-0.5 rounded-full bg-secondary text-secondary-foreground text-xs font-medium">Programada</span>
            </div>
          </div>
          <p th:if="${#lists.isEmpty(todayPatients)}" class="text-center text-muted-foreground text-sm py-8">No hay pacientes programados para hoy</p>
        </div>
      </div>

    </div>
  </main>
</div>
<script th:src="@{/js/medipass.js}"></script>
</body>
</html>
