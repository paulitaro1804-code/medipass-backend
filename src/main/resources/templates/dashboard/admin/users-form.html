<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/head :: head('Formulario de Usuario')}"></head>
<body class="font-sans bg-background text-foreground antialiased">
<div id="sidebar-overlay"></div>
<div class="min-h-screen bg-background">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <main class="lg:ml-64">
    <div th:replace="~{fragments/dashboard-header :: dashboardHeader}"></div>
    <div class="p-4 md:p-6">

      <!-- Breadcrumb -->
      <div class="flex items-center gap-2 text-sm text-muted-foreground mb-6">
        <a th:href="@{/dashboard/admin/users}" class="hover:text-primary transition-colors">Usuarios</a>
        <i data-lucide="chevron-right" class="w-4 h-4"></i>
        <span class="text-foreground" th:text="${editUser != null} ? 'Editar usuario' : 'Nuevo usuario'">Nuevo usuario</span>
      </div>

      <div class="max-w-2xl">
        <div class="bg-card border border-border/50 rounded-xl p-6 space-y-6">
          <h3 class="text-lg font-semibold text-foreground"
              th:text="${editUser != null} ? 'Editar datos del usuario' : 'Crear nuevo usuario'">Nuevo usuario</h3>

          <form th:action="${editUser != null} ? @{/dashboard/admin/users/{id}/edit(id=${editUser.id})} : @{/dashboard/admin/users/new}"
                method="post" class="space-y-5">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <!-- Nombres y Apellidos -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="block text-sm font-medium text-foreground" for="nombres">Nombres <span class="text-destructive">*</span></label>
                <input type="text" id="nombres" name="nombres" required
                       th:value="${editUser?.nombres}"
                       placeholder="Nombres"
                       class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm" />
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-medium text-foreground" for="apellidos">Apellidos <span class="text-destructive">*</span></label>
                <input type="text" id="apellidos" name="apellidos" required
                       th:value="${editUser?.apellidos}"
                       placeholder="Apellidos"
                       class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm" />
              </div>
            </div>

            <!-- Email -->
            <div class="space-y-2">
              <label class="block text-sm font-medium text-foreground" for="email">Correo electronico <span class="text-destructive">*</span></label>
              <input type="email" id="email" name="email" required
                     th:value="${editUser?.email}"
                     placeholder="usuario@medipass.com"
                     class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm" />
            </div>

            <!-- Password (solo para nuevo usuario) -->
            <div th:if="${editUser == null}" class="space-y-2">
              <label class="block text-sm font-medium text-foreground" for="password">Contrasena <span class="text-destructive">*</span></label>
              <div class="relative">
                <input type="password" id="password" name="password" required
                       placeholder="Minimo 8 caracteres"
                       class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm pr-10" />
                <button type="button" class="password-toggle absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground" data-target="password">
                  <i data-lucide="eye" class="w-4 h-4"></i>
                </button>
              </div>
            </div>

            <!-- Documento y Rol -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="space-y-2">
                <label class="block text-sm font-medium text-foreground" for="documento">Documento</label>
                <input type="text" id="documento" name="documento"
                       th:value="${editUser?.documento}"
                       placeholder="Numero de documento"
                       class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm" />
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-medium text-foreground" for="role">Rol <span class="text-destructive">*</span></label>
                <select id="role" name="role" required
                        class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm appearance-none cursor-pointer">
                  <option value="">Seleccionar rol</option>
                  <option value="ADMIN"       th:selected="${editUser?.role?.name() == 'ADMIN'}">Admin</option>
                  <option value="PATIENT"     th:selected="${editUser?.role?.name() == 'PATIENT'}">Paciente</option>
                  <option value="VALIDATOR"   th:selected="${editUser?.role?.name() == 'VALIDATOR'}">Validador</option>
                  <option value="COORDINATOR" th:selected="${editUser?.role?.name() == 'COORDINATOR'}">Coordinador</option>
                  <option value="DOCTOR"      th:selected="${editUser?.role?.name() == 'DOCTOR'}">Medico</option>
                  <option value="LAB"         th:selected="${editUser?.role?.name() == 'LAB'}">Laboratorio</option>
                  <option value="SUPPORT"     th:selected="${editUser?.role?.name() == 'SUPPORT'}">Soporte</option>
                </select>
              </div>
            </div>

            <!-- Estado (solo en edicion) -->
            <div th:if="${editUser != null}" class="space-y-2">
              <label class="block text-sm font-medium text-foreground" for="estado">Estado</label>
              <select id="estado" name="estado"
                      class="w-full px-3 py-2.5 rounded-lg border border-border/50 bg-secondary text-foreground focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-colors text-sm appearance-none cursor-pointer">
                <option value="ACTIVO"     th:selected="${editUser?.estado?.name() == 'ACTIVO'}">Activo</option>
                <option value="PENDIENTE"  th:selected="${editUser?.estado?.name() == 'PENDIENTE'}">Pendiente</option>
                <option value="SUSPENDIDO" th:selected="${editUser?.estado?.name() == 'SUSPENDIDO'}">Suspendido</option>
              </select>
            </div>

            <!-- Buttons -->
            <div class="flex items-center gap-3 pt-2">
              <button type="submit"
                      class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-primary text-primary-foreground hover:bg-primary/90 transition-colors font-medium text-sm">
                <i th:if="${editUser == null}" data-lucide="plus" class="w-4 h-4"></i>
                <i th:unless="${editUser == null}" data-lucide="save" class="w-4 h-4"></i>
                <span th:text="${editUser != null} ? 'Guardar cambios' : 'Crear usuario'">Crear</span>
              </button>
              <a th:href="@{/dashboard/admin/users}"
                 class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg border border-border text-muted-foreground hover:bg-secondary/50 transition-colors text-sm">
                Cancelar
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </main>
</div>
<script th:src="@{/js/medipass.js}"></script>
</body>
</html>
