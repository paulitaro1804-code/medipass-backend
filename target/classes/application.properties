# ────────────────────────────────────────────────────────────────────────────
# MEDIPASS Backend - application.properties
# Sensitive values are read from environment variables.
# For local development create application-local.properties (gitignored) and
# override only what you need, or export the variables in your shell.
# ────────────────────────────────────────────────────────────────────────────

spring.application.name=medipass-backend
server.port=${PORT:8218}

# -- MongoDB ------------------------------------------------------------------
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:medipass}

# -- JWT ----------------------------------------------------------------------
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# -- Swagger / OpenAPI --------------------------------------------------------
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# -- Logging ------------------------------------------------------------------
logging.level.com.medipass=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.data.mongodb=WARN

# -- Thymeleaf ----------------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# -- Email (Mailtrap Sandbox SMTP) --------------------------------------------
spring.mail.host=${MAIL_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAIL_PORT:2525}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
medipass.mail.from=${MAIL_FROM:noreply@medipass.com}

# -- Session ------------------------------------------------------------------
server.servlet.session.timeout=30m
