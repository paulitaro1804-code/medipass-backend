<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Error | MEDIPASS')}"></head>
<body class="font-sans bg-background text-foreground antialiased min-h-screen flex items-center justify-center">
<div class="text-center px-6 max-w-md mx-auto">

  <!-- Logo -->
  <div class="flex items-center justify-center gap-3 mb-8">
    <div class="w-10 h-10 rounded-xl bg-primary flex items-center justify-center">
      <i data-lucide="heart-pulse" class="w-6 h-6 text-primary-foreground"></i>
    </div>
    <span class="text-xl font-bold text-foreground tracking-wide">MEDIPASS</span>
  </div>

  <!-- 401 / 403 → access denied -->
  <th:block th:if="${status == 401 or status == 403}">
    <div class="w-20 h-20 rounded-full bg-destructive/10 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="shield-alert" class="w-10 h-10 text-destructive"></i>
    </div>
    <h1 class="text-4xl font-bold text-foreground mb-2">403</h1>
    <h2 class="text-xl font-semibold text-foreground mb-3">Acceso denegado</h2>
    <p class="text-muted-foreground mb-8">Tu sesión ha expirado o no tienes permisos para acceder a esta página.</p>
    <a th:href="@{/login}"
       class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-primary text-primary-foreground font-semibold hover:bg-primary/90 transition-colors">
      <i data-lucide="log-in" class="w-4 h-4"></i>
      Iniciar sesión
    </a>
  </th:block>

  <!-- 404 -->
  <th:block th:if="${status == 404}">
    <div class="w-20 h-20 rounded-full bg-warning/10 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="search-x" class="w-10 h-10 text-warning"></i>
    </div>
    <h1 class="text-4xl font-bold text-foreground mb-2">404</h1>
    <h2 class="text-xl font-semibold text-foreground mb-3">Página no encontrada</h2>
    <p class="text-muted-foreground mb-8">La página que buscas no existe o fue movida.</p>
    <a th:href="@{/}"
       class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-primary text-primary-foreground font-semibold hover:bg-primary/90 transition-colors">
      <i data-lucide="home" class="w-4 h-4"></i>
      Ir al inicio
    </a>
  </th:block>

  <!-- 500 / other errors -->
  <th:block th:unless="${status == 401 or status == 403 or status == 404}">
    <div class="w-20 h-20 rounded-full bg-destructive/10 flex items-center justify-center mx-auto mb-6">
      <i data-lucide="alert-triangle" class="w-10 h-10 text-destructive"></i>
    </div>
    <h1 class="text-4xl font-bold text-foreground mb-2" th:text="${status ?: 500}">500</h1>
    <h2 class="text-xl font-semibold text-foreground mb-3">Error del servidor</h2>
    <p class="text-muted-foreground mb-8" th:text="${message ?: 'Ha ocurrido un error inesperado. Por favor inténtalo de nuevo.'}">Error</p>
    <a th:href="@{/}"
       class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-primary text-primary-foreground font-semibold hover:bg-primary/90 transition-colors">
      <i data-lucide="home" class="w-4 h-4"></i>
      Volver al inicio
    </a>
  </th:block>

</div>
<script th:src="@{/js/medipass.js}"></script>
</body>
</html>
